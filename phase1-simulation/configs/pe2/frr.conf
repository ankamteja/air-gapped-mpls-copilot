frr version 8.0
frr defaults traditional
hostname pe2
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 3.3.3.3/32
!
interface eth1
 ip address 10.0.2.2/24
 ip ospf area 0
!
router ospf
 ospf router-id 3.3.3.3
 network 3.3.3.3/32 area 0
 network 10.0.2.0/24 area 0
!
mpls ldp
 router-id 3.3.3.3
 !
 address-family ipv4
  discovery transport-address 3.3.3.3
  !
  interface lo
  !
  interface eth1
  !
 exit-address-family
!
