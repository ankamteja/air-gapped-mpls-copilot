frr defaults traditional
hostname ce-branch2
!
interface eth1
 ip address 10.2.12.2/30
!
interface lo
 ip address 12.12.12.12/32
!
! eBGP to provider edge (PE). This site advertises its loopback (12.12.12.12/32)
! as the "site network". Routes to the other sites are learned back from
! the PE (they arrive via the L3VPN, but the CE just sees plain eBGP).
router bgp 65102
 no bgp ebgp-requires-policy
 bgp router-id 12.12.12.12
 neighbor 10.2.12.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 12.12.12.12/32
  neighbor 10.2.12.1 activate
 exit-address-family
!
line vty
!
