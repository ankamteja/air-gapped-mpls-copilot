frr defaults traditional
hostname ce-hub
!
interface eth1
 ip address 10.1.13.2/30
!
interface lo
 ip address 13.13.13.13/32
!
! eBGP to provider edge (PE). This site advertises its loopback (13.13.13.13/32)
! as the "site network". Routes to the other sites are learned back from
! the PE (they arrive via the L3VPN, but the CE just sees plain eBGP).
router bgp 65103
 no bgp ebgp-requires-policy
 bgp router-id 13.13.13.13
 neighbor 10.1.13.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 13.13.13.13/32
  neighbor 10.1.13.1 activate
 exit-address-family
!
line vty
!
