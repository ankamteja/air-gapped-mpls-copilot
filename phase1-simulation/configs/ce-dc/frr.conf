frr defaults traditional
hostname ce-dc
!
interface eth1
 ip address 10.2.14.2/30
!
interface lo
 ip address 14.14.14.14/32
!
! eBGP to provider edge (PE). This site advertises its loopback (14.14.14.14/32)
! as the "site network". Routes to the other sites are learned back from
! the PE (they arrive via the L3VPN, but the CE just sees plain eBGP).
router bgp 65104
 no bgp ebgp-requires-policy
 bgp router-id 14.14.14.14
 neighbor 10.2.14.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 14.14.14.14/32
  neighbor 10.2.14.1 activate
 exit-address-family
!
line vty
!
