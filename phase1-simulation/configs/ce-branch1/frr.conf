frr defaults traditional
hostname ce-branch1
!
interface eth1
 ip address 10.1.11.2/30
!
interface lo
 ip address 11.11.11.11/32
!
! eBGP to provider edge (PE). This site advertises its loopback (11.11.11.11/32)
! as the "site network". Routes to the other sites are learned back from
! the PE (they arrive via the L3VPN, but the CE just sees plain eBGP).
router bgp 65101
 no bgp ebgp-requires-policy
 bgp router-id 11.11.11.11
 neighbor 10.1.11.1 remote-as 65000
 !
 address-family ipv4 unicast
  network 11.11.11.11/32
  neighbor 10.1.11.1 activate
 exit-address-family
!
line vty
!
